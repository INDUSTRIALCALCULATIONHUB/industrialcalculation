<div class="header">
<h1>Hopper Valley Calculator</h1>
<p>Calculate angle or height of industrial hopper</p>
</div>

<div class="container">

<select id="mode" onchange="toggleMode()">
<option value="angle">Calculate Angle</option>
<option value="height">Calculate Height</option>
</select>

<input type="number" id="Lt" placeholder="Top Length (m)">
<input type="number" id="Wt" placeholder="Top Width (m)">
<input type="number" id="Lb" placeholder="Bottom Length (m)">
<input type="number" id="Wb" placeholder="Bottom Width (m)">

<div id="heightInput">
<input type="number" id="H" placeholder="Height (m)">
</div>

<div id="angleInput" style="display:none;">
<input type="number" id="angle" placeholder="Angle (degrees)">
</div>

<div style="text-align:center;">
<button class="calc-btn" onclick="calculate()">Calculate</button>
<button class="reset-btn" onclick="resetForm()">Reset</button>
</div>

</div>

<div id="output"></div>

<div class="container">
<h3>Formula</h3>
<p>Based on geometry of pyramid hopper</p>
</div>

<div class="section">
<h3>Engineering Notes</h3>

<script>
function toggleMode() {
    let mode = document.getElementById("mode").value;

    document.getElementById("heightInput").style.display = mode === "angle" ? "block" : "none";
    document.getElementById("angleInput").style.display = mode === "height" ? "block" : "none";
}

function calculate() {

let Lt = parseFloat(document.getElementById("Lt").value);
let Wt = parseFloat(document.getElementById("Wt").value);
let Lb = parseFloat(document.getElementById("Lb").value);
let Wb = parseFloat(document.getElementById("Wb").value);

let mode = document.getElementById("mode").value;

let dx = (Lt - Lb) / 2;
let dy = (Wt - Wb) / 2;

let r = Math.sqrt(dx*dx + dy*dy);

if(mode === "angle") {

let H = parseFloat(document.getElementById("H").value);
if(isNaN(H)) return;

let angle = Math.atan(H / r) * (180 / Math.PI);

document.getElementById("output").innerHTML =
`<div class="card"><h3>Result</h3><p>Hopper Angle = ${angle.toFixed(2)}°</p></div>`;
}

else {

let angle = parseFloat(document.getElementById("angle").value);
if(isNaN(angle)) return;

let H = r * Math.tan(angle * Math.PI / 180);

document.getElementById("output").innerHTML =
`<div class="card"><h3>Result</h3><p>Hopper Height = ${H.toFixed(2)} m</p></div>`;
}
}

function resetForm(){
document.getElementById("Lt").value="";
document.getElementById("Wt").value="";
document.getElementById("Lb").value="";
document.getElementById("Wb").value="";
document.getElementById("H").value="";
document.getElementById("angle").value="";
document.getElementById("output").innerHTML="";
}
</script>
