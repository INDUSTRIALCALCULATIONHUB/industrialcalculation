<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Industrial Calculation Hub | Engineering Tools</title>

<meta name="description" content="Professional engineering calculators, converters, and industrial tools for real-world applications.">

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1658062441623612"
crossorigin="anonymous"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
}

/* MOBILE TOP BAR */
.mobile-header {
    display: none;
    background: #1e3c72;
    color: white;
    padding: 12px;
    font-size: 18px;
}

.menu-btn {
    font-size: 22px;
    cursor: pointer;
    margin-right: 10px;
}

/* APP */
.app {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: white;
    padding: 15px;
    border-right: 1px solid #ddd;
    transition: 0.3s;
}

.sidebar h2 {
    color: #1e3c72;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin: 6px 0;
    color: #333;
    text-decoration: none;
    border-radius: 6px;
}

.sidebar a:hover {
    background: #f1f5ff;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* SEARCH BAR */
.topbar {
    background: white;
    padding: 12px;
    border-bottom: 1px solid #ddd;
    position: relative;
}

.topbar input {
    width: 60%;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
}

/* AUTOSUGGEST */
#suggestBox {
    position: absolute;
    background: white;
    width: 60%;
    max-width: 400px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ddd;
    z-index: 1000;
}

#suggestBox div {
    padding: 10px;
    cursor: pointer;
}

#suggestBox div:hover {
    background: #eee;
}

/* CONTENT */
#content {
    padding: 20px;
    overflow-y: auto;
}

/* CARD */
.card {
    display: block;
    background: white;
    padding: 16px;
    margin: 10px 0;
    border-radius: 10px;
    color: #222;
    text-decoration: none;
    border-left: 5px solid #1e3c72;
}

/* MOBILE */
@media(max-width:800px){

    .mobile-header {
        display: flex;
        align-items: center;
    }

    .sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        height: 100%;
        z-index: 1000;
    }

    .sidebar.active {
        left: 0;
    }

    .topbar input {
        width: 90%;
    }

    #suggestBox {
        width: 90%;
    }
}
</style>
</head>

<body>

<!-- MOBILE HEADER -->
<div class="mobile-header">
<span class="menu-btn" onclick="toggleMenu()">☰</span>
Industrial Calculation Hub
</div>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h2>Industrial Calculation Hub</h2>

<a onclick="loadPage('home')">🏠 Home</a>
<a onclick="loadPage('tools')">🔧 Engineering Tools</a>
<a onclick="loadPage('converters')">⚙️ Unit Converters</a>
<a onclick="loadPage('blogs')">📘 Engineering Knowledge</a>
<a onclick="showAnalytics()">📊 Usage Analytics</a>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<input id="globalSearch" placeholder="Search tools, converters...">
<div id="suggestBox"></div>
</div>

<div id="content">
<h2>Industrial Calculation Hub</h2>
<p>Select tools from menu or search above.</p>
</div>

</div>
</div>

<script>

/* MOBILE MENU */
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

/* DATABASE */
const tools = [

{name:"Pump Power Calculator", url:"pump-power-calculator.html"},
{name:"Pipe Flow Calculator", url:"pipe-flow-calculator.html"},
{name:"Air Density Calculator", url:"air-density.html"},
{name:"Heat Transfer Tool", url:"heat-transfer.html"},
{name:"Hopper Valley Angle Calculator", url:"hopper-valley-angle-calculator.html"},

{name:"Weight Conversion", url:"weight-conversion.html"},
{name:"Length Conversion", url:"length-conversion.html"},
{name:"Pressure Conversion", url:"pressure-conversion.html"},
{name:"Temperature Conversion", url:"temperature-conversion.html"},
{name:"Area Conversion", url:"area-conversion.html"},
{name:"Volume Conversion", url:"volume-conversion.html"}

];

/* LOAD PAGE */
function loadPage(page){

let content = document.getElementById("content");

if(page==="tools"){
content.innerHTML = "<h2>Engineering Tools</h2>" +
tools.slice(0,5).map(t =>
`<a class='card' href='${t.url}'>${t.name}</a>`
).join("");
}

if(page==="converters"){
content.innerHTML = "<h2>Converters</h2>" +
tools.slice(5).map(t =>
`<a class='card' href='${t.url}'>${t.name}</a>`
).join("");
}

if(page==="blogs"){
content.innerHTML = `
<h2>Engineering Knowledge</h2>
<a class='card' href='reynolds-number-explained.html'>Reynolds Number Explained</a>
<a class='card' href='bernoulli-equation-explained.html'>Bernoulli Equation Explained</a>
<a class='card' href='heat-transfer-explained.html'>Heat Transfer Explained</a>
`;
}

if(page==="home"){
content.innerHTML = "<h2>Dashboard</h2><p>Select tools or search above.</p>";
}
}

/* SEARCH */
document.getElementById("globalSearch").addEventListener("keyup", function(e){

let val = e.target.value.toLowerCase();

let results = tools.filter(t =>
t.name.toLowerCase().includes(val)
);

document.getElementById("content").innerHTML =
"<h2>Search Results</h2>" +
results.map(r =>
`<a class='card' href='${r.url}'>${r.name}</a>`
).join("");

});

/* AUTOSUGGEST */
document.getElementById("globalSearch").addEventListener("input", function(){

let val = this.value.toLowerCase();
let box = document.getElementById("suggestBox");

if(!val){
box.innerHTML="";
return;
}

let matches = tools.filter(t =>
t.name.toLowerCase().includes(val)
);

box.innerHTML = matches.map(m =>
`<div onclick="window.location='${m.url}'">${m.name}</div>`
).join("");

});

</script>

</body>
</html>
