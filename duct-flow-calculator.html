<div class="wrapper">

<div class="header">
    <h1>Duct Flow</h1>

</div>

<div class="section">

<label>Select Calculation Mode</label>
<select id="mode">
    <option value="flow">Flow Rate (Q)</option>
    <option value="velocity">Velocity (V)</option>
    <option value="size">Duct Size</option>
</select>

<label>Duct Type</label>
<select id="ductType">
    <option value="rect">Rectangular</option>
    <option value="circular">Circular</option>
</select>

<div id="inputs"></div>

<!-- ================= SCRIPT ================= -->
<script>

function renderInputs(){
    let mode = document.getElementById("mode").value;
    let type = document.getElementById("ductType").value;

    let html = "";

    if(mode === "flow"){

        if(type === "rect"){
            html = `
Width (mm): <input type="number" id="w" placeholder="Enter width in mm">
Height (mm): <input type="number" id="h" placeholder="Enter height in mm">
Velocity (m/s): <input type="number" id="v" placeholder="Enter velocity">
`;
        } else {
            html = `
Diameter (mm): <input type="number" id="d" placeholder="Enter diameter in mm">
Velocity (m/s): <input type="number" id="v" placeholder="Enter velocity">
`;
        }
    }

    else if(mode === "velocity"){

        if(type === "rect"){
            html = `
Width (mm): <input type="number" id="w" placeholder="Enter width in mm">
Height (mm): <input type="number" id="h" placeholder="Enter height in mm">
Flow Rate (m³/s): <input type="number" id="q" placeholder="Enter flow rate">
`;
        } else {
            html = `
Diameter (mm): <input type="number" id="d" placeholder="Enter diameter in mm">
Flow Rate (m³/s): <input type="number" id="q" placeholder="Enter flow rate">
`;
        }
    }

    else {

        if(type === "rect"){
            html = `
Flow Rate (m³/s): <input type="number" id="q" placeholder="Enter flow rate">
Velocity (m/s): <input type="number" id="v" placeholder="Enter velocity">
Width (mm): <input type="number" id="w" placeholder="Enter width in mm">
`;
        } else {
            html = `
Flow Rate (m³/s): <input type="number" id="q" placeholder="Enter flow rate">
Velocity (m/s): <input type="number" id="v" placeholder="Enter velocity">
`;
        }
    }

    document.getElementById("inputs").innerHTML = html;
    attachEvents();
}

function attachEvents(){
    document.querySelectorAll("#inputs input").forEach(el=>{
        el.addEventListener("input", calculate);
    });
}

document.getElementById("mode").addEventListener("change", renderInputs);
document.getElementById("ductType").addEventListener("change", renderInputs);

renderInputs();

function calculate(){

    let mode = document.getElementById("mode").value;
    let type = document.getElementById("ductType").value;

    let resultHTML = "";

    // FLOW
    if(mode === "flow"){

        let v, area;

        if(type === "rect"){

            let w_mm = parseFloat(document.getElementById("w").value);
            let h_mm = parseFloat(document.getElementById("h").value);
            v = parseFloat(document.getElementById("v").value);

            if(isNaN(w_mm)||isNaN(h_mm)||isNaN(v)||w_mm<=0||h_mm<=0||v<=0){
                document.getElementById("output").innerHTML="";
                return;
            }

            let w = w_mm/1000;
            let h = h_mm/1000;

            area = w*h;

        } else {

            let d_mm = parseFloat(document.getElementById("d").value);
            v = parseFloat(document.getElementById("v").value);

            if(isNaN(d_mm)||isNaN(v)||d_mm<=0||v<=0){
                document.getElementById("output").innerHTML="";
                return;
            }

            let d = d_mm/1000;
            area = Math.PI*Math.pow(d/2,2);
        }

        let Q_m3s = area*v;
        let Q_m3hr = Q_m3s*3600;
        let Q_cfm = Q_m3s*2118.88;

        resultHTML = `
        <div class="result-card">
        <table class="result-table">
        <tr><th>Flow Unit</th><th>Value</th></tr>
        <tr><td>m³/s</td><td>${Q_m3s.toFixed(4)}</td></tr>
        <tr><td>m³/hr</td><td>${Q_m3hr.toFixed(2)}</td></tr>
        <tr><td>CFM</td><td>${Q_cfm.toFixed(2)}</td></tr>
        </table>
        </div>`;
    }

    // VELOCITY
    else if(mode === "velocity"){

        let Q, area;

        if(type === "rect"){

            let w_mm = parseFloat(document.getElementById("w").value);
            let h_mm = parseFloat(document.getElementById("h").value);
            Q = parseFloat(document.getElementById("q").value);

            if(isNaN(w_mm)||isNaN(h_mm)||isNaN(Q)||w_mm<=0||h_mm<=0||Q<=0){
                document.getElementById("output").innerHTML="";
                return;
            }

            let w = w_mm/1000;
            let h = h_mm/1000;

            area = w*h;

        } else {

            let d_mm = parseFloat(document.getElementById("d").value);
            Q = parseFloat(document.getElementById("q").value);

            if(isNaN(d_mm)||isNaN(Q)||d_mm<=0||Q<=0){
                document.getElementById("output").innerHTML="";
                return;
            }

            let d = d_mm/1000;
            area = Math.PI*Math.pow(d/2,2);
        }

        let V_mps = Q/area;
        let V_fts = V_mps*3.28084;

        resultHTML = `
        <div class="result-card">
        <table class="result-table">
        <tr><th>Velocity Unit</th><th>Value</th></tr>
        <tr><td>m/s</td><td>${V_mps.toFixed(3)}</td></tr>
        <tr><td>ft/s</td><td>${V_fts.toFixed(3)}</td></tr>
        </table>
        </div>`;
    }

    // SIZE
    else{

        let Q = parseFloat(document.getElementById("q").value);
        let V = parseFloat(document.getElementById("v").value);

        if(isNaN(Q)||isNaN(V)||Q<=0||V<=0){
            document.getElementById("output").innerHTML="";
            return;
        }

        let area = Q/V;

        if(type==="rect"){

            let w_mm = parseFloat(document.getElementById("w").value);

            if(isNaN(w_mm)||w_mm<=0){
                document.getElementById("output").innerHTML="";
                return;
            }

            let w = w_mm/1000;
            let h = area/w;

            resultHTML = `
            <div class="result-card">
            <table class="result-table">
            <tr><th>Parameter</th><th>Value</th></tr>

            <tr><td>Width</td><td>${w_mm.toFixed(1)} mm | ${(w).toFixed(4)} m | ${(w*3.28084).toFixed(3)} ft</td></tr>
            <tr><td>Height</td><td>${(h*1000).toFixed(1)} mm | ${(h).toFixed(4)} m | ${(h*3.28084).toFixed(3)} ft</td></tr>

            </table>
            </div>`;
        }

        else{

            let d = Math.sqrt((4*area)/Math.PI);

            let d_mm = d*1000;
            let d_ft = d*3.28084;

            resultHTML = `
            <div class="result-card">
            <table class="result-table">
            <tr><th>Parameter</th><th>Value</th></tr>

            <tr><td>Diameter</td><td>${d_mm.toFixed(1)} mm | ${d.toFixed(4)} m | ${d_ft.toFixed(3)} ft</td></tr>

            </table>
            </div>`;
        }
    }

    document.getElementById("output").innerHTML = resultHTML;
}
</script>

</body>
