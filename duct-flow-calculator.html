<script>

function renderInputs(){
    let mode = document.getElementById("mode").value;
    let type = document.getElementById("ductType").value;

    let html = "";

    // ---------------- FLOW ----------------
    if(mode === "flow"){
        if(type === "rect"){
            html = `
Width (m): <input type="number" id="w">
Height (m): <input type="number" id="h">
Velocity (m/s): <input type="number" id="v">

Flow Unit:
<select id="flowUnit">
  <option value="m3s">m³/s</option>
  <option value="m3hr">m³/hr</option>
  <option value="cfm">CFM</option>
</select>
`;
        } else {
            html = `
Diameter (m): <input type="number" id="d">
Velocity (m/s): <input type="number" id="v">

Flow Unit:
<select id="flowUnit">
  <option value="m3s">m³/s</option>
  <option value="m3hr">m³/hr</option>
  <option value="cfm">CFM</option>
</select>
`;
        }
    }

    // ---------------- VELOCITY ----------------
    else if(mode === "velocity"){
        if(type === "rect"){
            html = `
Width (m): <input type="number" id="w">
Height (m): <input type="number" id="h">
Flow Rate (m³/s): <input type="number" id="q">

Velocity Unit:
<select id="velUnit">
  <option value="ms">m/s</option>
  <option value="fts">ft/s</option>
</select>
`;
        } else {
            html = `
Diameter (m): <input type="number" id="d">
Flow Rate (m³/s): <input type="number" id="q">

Velocity Unit:
<select id="velUnit">
  <option value="ms">m/s</option>
  <option value="fts">ft/s</option>
</select>
`;
        }
    }

    // ---------------- SIZE ----------------
    else {
        html = `
Flow Rate (m³/s):
<input type="number" id="q">

Velocity (m/s):
<input type="number" id="v">

Diameter Unit:
<select id="lenUnit">
  <option value="m">m</option>
  <option value="mm">mm</option>
  <option value="ft">ft</option>
</select>
`;
    }

    document.getElementById("inputs").innerHTML = html;
    attachEvents();
}

document.getElementById("mode").addEventListener("change", () => {
    renderInputs();
    document.getElementById("output").innerHTML = "";
});

document.getElementById("ductType").addEventListener("change", () => {
    renderInputs();
    document.getElementById("output").innerHTML = "";
});
renderInputs();

function attachEvents(){

    const controls =
        document.querySelectorAll("#inputs input");

    controls.forEach(control => {
        control.addEventListener("input", calculate);
    });
}
    
function calculate(){

    let mode = document.getElementById("mode").value;
    let type = document.getElementById("ductType").value;

    let flowUnit = "m3s";   // fixed internal base
    let velUnit = "ms";
    let lenUnit = "m";

    let result = 0;

    // ---------------- FLOW RATE ----------------
    if(mode === "flow"){

        let v, area;

        if(type === "rect"){

            let w = parseFloat(document.getElementById("w").value);
            let h = parseFloat(document.getElementById("h").value);
            v = parseFloat(document.getElementById("v").value);

            if(isNaN(w) || isNaN(h) || isNaN(v) || w<=0 || h<=0 || v<=0){
                document.getElementById("output").innerHTML = "";
                return;
            }

            area = w * h;

        } else {

            let d = parseFloat(document.getElementById("d").value);
            v = parseFloat(document.getElementById("v").value);

            if(isNaN(d) || isNaN(v) || d<=0 || v<=0){
                document.getElementById("output").innerHTML = "";
                return;
            }

            area = Math.PI * Math.pow(d/2,2);
        }

        let Q = area * v; // m³/s

        // UNIT CONVERSION
        let unit = document.getElementById("flowUnit")?.value || "m3s";

        if(unit === "m3hr"){
            result = Q * 3600;
            unit = "m³/hr";
        }
        else if(unit === "cfm"){
            result = Q * 2118.88;
            unit = "CFM";
        }
        else{
            result = Q;
            unit = "m³/s";
        }

        document.getElementById("output").innerHTML =
            "Flow Rate = " + result.toFixed(3) + " " + unit;
    }

    // ---------------- VELOCITY ----------------
    if(mode === "velocity"){

        let Q, area;

        if(type === "rect"){

            let w = parseFloat(document.getElementById("w").value);
            let h = parseFloat(document.getElementById("h").value);
            Q = parseFloat(document.getElementById("q").value);

            if(isNaN(w) || isNaN(h) || isNaN(Q) || w<=0 || h<=0 || Q<=0){
                document.getElementById("output").innerHTML = "";
                return;
            }

            area = w * h;

        } else {

            let d = parseFloat(document.getElementById("d").value);
            Q = parseFloat(document.getElementById("q").value);

            if(isNaN(d) || isNaN(Q) || d<=0 || Q<=0){
                document.getElementById("output").innerHTML = "";
                return;
            }

            area = Math.PI * Math.pow(d/2,2);
        }

        let V = Q / area;

        let unit = document.getElementById("velUnit")?.value || "ms";

        if(unit === "fts"){
            result = V * 3.28084;
            unit = "ft/s";
        } else {
            result = V;
            unit = "m/s";
        }

        document.getElementById("output").innerHTML =
            "Velocity = " + result.toFixed(3) + " " + unit;
    }

    // ---------------- SIZE ----------------
    if(mode === "size"){

        let Q = parseFloat(document.getElementById("q").value);
        let V = parseFloat(document.getElementById("v").value);

        if(isNaN(Q) || isNaN(V) || Q<=0 || V<=0){
            document.getElementById("output").innerHTML = "";
            return;
        }

        let area = Q / V; // m²

        let unit = document.getElementById("lenUnit")?.value || "m";

        if(type === "rect"){

            result = area;
            document.getElementById("output").innerHTML =
                "Required Area = " + result.toFixed(3) + " m²";
        }
        else{

            let d = Math.sqrt((4 * area) / Math.PI);

            if(unit === "mm"){
                result = d * 1000;
                unit = "mm";
            }
            else if(unit === "ft"){
                result = d * 3.28084;
                unit = "ft";
            }
            else{
                result = d;
                unit = "m";
            }

            document.getElementById("output").innerHTML =
                "Required Diameter = " + result.toFixed(3) + " " + unit;
        }
    }
}
</script>
