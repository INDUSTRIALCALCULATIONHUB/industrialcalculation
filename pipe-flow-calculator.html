<body>

<!-- FIXED HEADER -->
<div class="header-bar">
🧰 Pipe Flow Rate Calculator |

<!-- MAIN CONTAINER -->
<div class="container">

<h2>🔧 Pipe Flow Rate Calculator</h2>

<label>Select Calculation Type</label>
<select id="mode" onchange="renderInputs()">
<option value="flow">Flow Rate (Q)</option>
<option value="velocity">Velocity (V)</option>
<option value="diameter">Diameter (D)</option>
</select>

<div id="inputs"></div>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<!-- FIXED FOOTER -->
<div class="footer-bar">
© 2026 Industrial Calculation Hub
</div>

<!-- CMP CONSENT BANNER -->
<div id="consent-banner">
<p>This website uses cookies for analytics and personalized ads.</p>
<button class="accept" onclick="acceptConsent()">Accept</button>
<button class="reject" onclick="rejectConsent()">Reject</button>
<button class="manage" onclick="manageConsent()">Manage</button>
</div>

<script>

function renderInputs(){
    let mode = document.getElementById("mode").value;
    let html = "";

    if(mode === "flow"){
        html = `
        <label>Diameter (m)</label>
        <input type="number" id="d">

        <label>Velocity (m/s)</label>
        <input type="number" id="v">
        `;
    }
    else if(mode === "velocity"){
        html = `
        <label>Diameter (m)</label>
        <input type="number" id="d">

        <label>Flow Rate (m³/s)</label>
        <input type="number" id="q">
        `;
    }
    else{
        html = `
        <label>Flow Rate (m³/s)</label>
        <input type="number" id="q">

        <label>Velocity (m/s)</label>
        <input type="number" id="v">
        `;
    }

    document.getElementById("inputs").innerHTML = html;
}

function calculate(){

    let mode = document.getElementById("mode").value;
    let result = "";

    if(mode === "flow"){
        let d = parseFloat(document.getElementById("d").value);
        let v = parseFloat(document.getElementById("v").value);
        let q = (Math.PI * d * d / 4) * v;
        result = "Flow Rate = " + q.toFixed(4) + " m³/s";
    }

    else if(mode === "velocity"){
        let d = parseFloat(document.getElementById("d").value);
        let q = parseFloat(document.getElementById("q").value);
        let v = q / (Math.PI * d * d / 4);
        result = "Velocity = " + v.toFixed(4) + " m/s";
    }

    else{
        let q = parseFloat(document.getElementById("q").value);
        let v = parseFloat(document.getElementById("v").value);
        let d = Math.sqrt((4*q)/(Math.PI*v));
        result = "Diameter = " + d.toFixed(4) + " m";
    }

    document.getElementById("result").innerHTML = result;
}

/* CMP */
function showBanner(){
    if(!localStorage.getItem("consent")){
        document.getElementById("consent-banner").style.display="block";
    }
}

function acceptConsent(){
    localStorage.setItem("consent","accepted");
    document.getElementById("consent-banner").style.display="none";
}

function rejectConsent(){
    localStorage.setItem("consent","rejected");
    document.getElementById("consent-banner").style.display="none";
}

function manageConsent(){
    alert("Open privacy settings page for detailed controls.");
}

window.onload = renderInputs;
window.onload = showBanner;

</script>

</body>
