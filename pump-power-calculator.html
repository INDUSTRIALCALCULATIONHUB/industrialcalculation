<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pump Power Calculator | Industrial Calculation Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    background: #1e3c72;
    padding: 12px;
    text-align: center;
}
.navbar a {
    color: white;
    margin: 8px;
    text-decoration: none;
}

/* CONTAINER */
.container {
    width: 80%;
    max-width: 600px;
    margin: 20px auto;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

/* REMOVE ARROWS */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
}
input[type=number] {
    -moz-appearance: textfield;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #1e3c72;
    color: white;
    border: none;
    cursor: pointer;
}

/* RESULT */
.result {
    margin-top: 15px;
    font-weight: bold;
    line-height: 1.6;
}

/* FOOTER */
.footer {
    position: sticky;
    bottom: 0;
    background: #1e3c72;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div class="container">

<h2>Pump Power Calculator</h2>

<label>Flow Rate (m³/hr)</label>
<input type="number" id="flow">

<label>Head (m)</label>
<input type="number" id="head">

<label>Efficiency (%)</label>
<input type="number" id="eff" value="70">

<button onclick="calculate()">Calculate Power</button>

<div class="result" id="result"></div>

</div>

<div class="footer">
© 2026 Industrial Calculation Hub
</div>

<script>

function calculate() {

    let Q = parseFloat(document.getElementById("flow").value);
    let H = parseFloat(document.getElementById("head").value);
    let eff = parseFloat(document.getElementById("eff").value) / 100;

    if(isNaN(Q) || isNaN(H) || isNaN(eff) || eff === 0){
        document.getElementById("result").innerHTML = "Please enter valid inputs";
        return;
    }

    // Convert m3/hr to m3/s
    Q = Q / 3600;

    // Power (kW)
    let power = (1000 * 9.81 * Q * H) / (eff * 1000);

    let motor = selectMotor(power);

    document.getElementById("result").innerHTML =
        "Required Power = " + power.toFixed(2) + " kW<br>" +
        "Recommended Motor = " + motor + " kW";
}

// STANDARD MOTOR SIZES
function selectMotor(power){
    let motors = [
    0.37,0.55,0.75,1.1,1.5,2.2,3,4,5.5,7.5,11,15,18.5,22,
    30,37,45,55,75,90,110,132,160,200,250,315,355];

    for(let i=0;i<motors.length;i++){
        if(power <= motors[i]){
            return motors[i];
        }
    }
    return "Above standard range";
}

</script>

</body>
</html>
