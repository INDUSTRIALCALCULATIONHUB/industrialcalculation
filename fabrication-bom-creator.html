<!-- ================= SCRIPT ================= -->
<script>

let bomData = [];
let MATERIAL_DB = {};

/* ================= ADD ITEM ================= */
function addItem() {

    let qty = document.getElementById("qty").value;
    let description = document.getElementById("description").value;
    let material = document.getElementById("material").value;
    let thk = document.getElementById("thk").value;
    let length = document.getElementById("length").value;
    let width = document.getElementById("width").value;
    let weight = document.getElementById("weight").value;

    if (!description || !qty) {
        alert("Description and Quantity required");
        return;
    }

    bomData.push({
        qty,
        description,
        material,
        thk,
        length,
        width,
        weight
    });

    renderTable();
    clearInputs();
}

/* ================= RENDER TABLE ================= */
function renderTable() {

    let html = `
    <tr>
        <th>SR</th>
        <th>QTY</th>
        <th>DESCRIPTION</th>
        <th>MATERIAL</th>
        <th>THK</th>
        <th>LENGTH</th>
        <th>WIDTH</th>
        <th>UNIT WT</th>
    </tr>`;

    let total = 0;

    bomData.forEach((row, i) => {

        total += Number(row.weight) || 0;

        html += `
        <tr>
            <td>${i + 1}</td>
            <td>${row.qty}</td>
            <td>${row.description}</td>
            <td>${row.material}</td>
            <td>${row.thk}</td>
            <td>${row.length}</td>
            <td>${row.width}</td>
            <td>${row.weight}</td>
        </tr>`;
    });

    document.getElementById("bomTable").innerHTML = html;
    document.getElementById("totalWeight").innerText = total.toFixed(2);
}

/* ================= CLEAR INPUTS ================= */
function clearInputs() {

    document.getElementById("qty").value = "";
    document.getElementById("description").value = "";
    document.getElementById("material").value = "";
    document.getElementById("thk").value = "";
    document.getElementById("length").value = "";
    document.getElementById("width").value = "";
    document.getElementById("weight").value = "";
}

/* ================= EXPORT CSV ================= */
function exportCSV() {

    if (bomData.length === 0) {
        alert("No data to export");
        return;
    }

    let csv = "Qty,Description,Material,THK,Length,Width,Weight\n";

    bomData.forEach(row => {
        csv += `${row.qty},${row.description},${row.material},${row.thk},${row.length},${row.width},${row.weight}\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "fabrication_bom.csv";
    a.click();
}

/* ================= CLEAR ALL ================= */
function clearAll() {
    bomData = [];
    renderTable();
}

/* ================= LOAD MATERIAL DB ================= */

/* LOAD MATERIAL DB */

fetch("./material-db.json")
.then(res => res.json())
.then(data => {

    MATERIAL_DB = data;

    let materialList = document.getElementById("materialList");
    materialList.innerHTML = "";

    function addMaterials(section){

        if(!section || !section.items) return;

        section.items.forEach(item=>{

            let opt=document.createElement("option");
            opt.value=item.grade;
            materialList.appendChild(opt);

        });

    }

    addMaterials(MATERIAL_DB.plate_sheet_material_recommended);
    addMaterials(MATERIAL_DB.pipe_material_recommended);
    addMaterials(MATERIAL_DB.angle_material_recommended);
    addMaterials(MATERIAL_DB.channel_material_recommended);
    addMaterials(MATERIAL_DB.beam_material_recommended);
    addMaterials(MATERIAL_DB.round_bar_material_recommended);

    console.log("Material DB loaded");

})
.catch(err=>console.error(err));


</script>
