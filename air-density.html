<script>
function calculate() {

    let altitude = parseFloat(document.getElementById("altitude").value);
    let temp = parseFloat(document.getElementById("temperature").value);

    let P0 = 101325;
    let T0 = 288.16;
    let L = 0.0065;
    let g = 9.80665;
    let M = 0.0289644;
    let R = 8.314462618;
    let R_specific = 287.058;

    let exponent = (g * M) / (R * L);

    let P = P0 * Math.pow((1 - (L * altitude) / T0), exponent);

    let T = temp + 273.15;
    let rho = P / (R_specific * T);

    let rho_lb = rho * 0.062428;

    // Pressure conversions
    let pressureTable = `
    <h3>Pressure</h3>
    <table border="1" style="margin:auto;">
        <tr><th>Unit</th><th>Value</th></tr>
        <tr><td>Pa</td><td>${P.toFixed(2)}</td></tr>
        <tr><td>kPa</td><td>${(P/1000).toFixed(2)}</td></tr>
        <tr><td>bar</td><td>${(P/100000).toFixed(2)}</td></tr>
        <tr><td>atm</td><td>${(P/101325).toFixed(2)}</td></tr>
        <tr><td>mmWC</td><td>${(P/9.80665).toFixed(2)}</td></tr>
    </table>
    `;

    // Density conversions
    let densityTable = `
    <h3>Density</h3>
    <table border="1" style="margin:auto;">
        <tr><th>Unit</th><th>Value</th></tr>
        <tr><td>kg/m³</td><td>${rho.toFixed(2)}</td></tr>
        <tr><td>lb/ft³</td><td>${rho_lb.toFixed(2)}</td></tr>
    </table>
    `;

    document.getElementById("output").innerHTML =
        "<h2>Results</h2>" + pressureTable + densityTable;
}

function resetForm() {
    document.getElementById("altitude").value = "";
    document.getElementById("temperature").value = "";
    document.getElementById("output").innerHTML = "";
}
</script>
