<div class="wrapper">

<div class="card">

<h2>Heat Transfer Calculator</h2>
<p style="text-align:center;">Fourier’s Law of Heat Conduction</p>

<label>Thermal Conductivity (k) [W/m·K]</label>
<input type="number" id="k">

<label>Area (A) [m²]</label>
<input type="number" id="area">

<label>Temperature Difference (ΔT) [°C]</label>
<input type="number" id="tempDiff">

<label>Thickness (L) [m]</label>
<input type="number" id="thickness">

<div style="text-align:center;">
<button class="calc-btn" onclick="calculate()">Calculate</button>
<button class="reset-btn" onclick="resetForm()">Reset</button>
</div>

<div class="output" id="output"></div>

</div>

</div>

<a href="privacy.html" style="color:white;">Privacy</a> |
<a href="terms.html" style="color:white;">Terms</a>
</footer>

<script>

function calculate(){

let k = parseFloat(document.getElementById("k").value);
let A = parseFloat(document.getElementById("area").value);
let dT = parseFloat(document.getElementById("tempDiff").value);
let L = parseFloat(document.getElementById("thickness").value);

if(isNaN(k) || isNaN(A) || isNaN(dT) || isNaN(L)){
    document.getElementById("output").innerHTML =
    "<div class='result-card' style='color:red;'>Please enter all values correctly</div>";
    return;
}

if(L <= 0){
    document.getElementById("output").innerHTML =
    "<div class='result-card' style='color:red;'>Thickness must be greater than 0</div>";
    return;
}

let Q = (k * A * dT) / L;

document.getElementById("output").innerHTML = `
<div class="result-card">
<h3>Result</h3>
<p><b>Heat Transfer Rate (Q):</b> ${Q.toFixed(2)} W</p>
</div>`;
}

function resetForm(){
document.getElementById("k").value="";
document.getElementById("area").value="";
document.getElementById("tempDiff").value="";
document.getElementById("thickness").value="";
document.getElementById("output").innerHTML="";
}

</script>
