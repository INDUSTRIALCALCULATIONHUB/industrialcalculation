<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thermal Expansion Calculator | Industrial Calculation Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    background: #1e3c72;
    padding: 12px;
    text-align: center;
}
.navbar a {
    color: white;
    margin: 8px;
    text-decoration: none;
}

/* CONTAINER */
.container {
    width: 80%;
    max-width: 600px;
    margin: 20px auto;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

/* REMOVE ARROWS */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
}
input[type=number] {
    -moz-appearance: textfield;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #1e3c72;
    color: white;
    border: none;
    cursor: pointer;
}

/* RESULT */
.result {
    margin-top: 15px;
    font-weight: bold;
}

/* FOOTER */
.footer {
    position: sticky;
    bottom: 0;
    background: #1e3c72;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div class="container">

<h2>Thermal Expansion Calculator</h2>

<label>Initial Length (m)</label>
<input type="number" id="length">

<label>Temperature Change (°C)</label>
<input type="number" id="temp">

<label>Select Material</label>
<select id="material">
<option value="12e-6">Mild Steel</option>
<option value="12e-6">IS 2062</option>
<option value="12e-6">Carbon Steel</option>
<option value="17e-6">Stainless Steel 304</option>
<option value="16e-6">Stainless Steel 316</option>
<option value="16e-6">Stainless Steel 316L</option>
<option value="23e-6">Aluminium</option>
<option value="11e-6">Cast Iron</option>
<option value="17e-6">Copper</option>
<option value="19e-6">Brass</option>
<option value="18e-6">Bronze</option>
<option value="8.5e-6">Titanium</option>
<option value="13e-6">Nickel</option>
</select>

<button onclick="calculate()">Calculate Expansion</button>

<div class="result" id="result"></div>

</div>

<div class="footer">
© 2026 Industrial Calculation Hub
</div>

<script>

function calculate() {

    let L = parseFloat(document.getElementById("length").value);
    let dT = parseFloat(document.getElementById("temp").value);
    let alpha = parseFloat(document.getElementById("material").value);

    if(isNaN(L) || isNaN(dT)){
        document.getElementById("result").innerHTML = "Please enter all values";
        return;
    }

    let expansion = L * alpha * dT;

    document.getElementById("result").innerHTML =
        "Expansion = " + expansion.toFixed(6) + " m<br>" +
        "Expansion = " + (expansion * 1000).toFixed(3) + " mm";
}

</script>

</body>
</html>
