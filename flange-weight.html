<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fabrication BOM Creator | Industrial Calculation Hub</title>

<meta name="description" content="Create fabrication BOM and export to Excel">
<meta name="keywords" content="BOM creator, fabrication BOM">

<!-- CMP (optional but recommended if AdSense is active) -->
<script async src="https://fundingchoicesmessages.google.com/i/pub-1658062441623612?ers=1"></script>

<!-- AdSense (optional if monetized) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1658062441623612"
crossorigin="anonymous"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- TOP BAR (required for your CSS design) -->
<div class="topbar">
    <div class="topbar-line">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<div class="wrapper">

<div class="header">
    <h1>Fabrication BOM Creator</h1>
</div>

<!-- ================= INPUT ================= -->
<div class="section">

<div class="bom-form">

<input type="number" id="qty" placeholder="Qty">

<input type="text" id="description" list="descriptionList" placeholder="Description">

<input type="text" id="material" list="materialList" placeholder="Material">

<input type="number" id="thk" placeholder="THK (mm)">

<input type="number" id="length" placeholder="Length (mm)">

<input type="number" id="width" placeholder="Width (mm)">

<input type="number" id="weight" placeholder="Unit Weight (kg)">

</div>

<div class="bom-buttons">
<button onclick="addItem()">Add Item</button>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="clearAll()">Clear</button>
</div>

</div>

<!-- ================= TABLE ================= -->
<div class="section">
<table id="bomTable" class="result-table"></table>

<h3>Total Weight: <span id="totalWeight">0</span> kg</h3>
</div>

</div>

<!-- ================= DATALISTS ================= -->

<datalist id="descriptionList">
<option value="Cone Plate">
<option value="Pipe">
<option value="Angle">
<option value="Channel">
<option value="Beam">
<option value="Rod">
<option value="Flange">
</datalist>

<datalist id="materialList"></datalist>

<!-- ================= SCRIPT ================= -->
<script>

let bomData = [];
let MATERIAL_DB = {};

/* ADD ITEM */
function addItem() {

    const qty = document.getElementById("qty").value;
    const description = document.getElementById("description").value;
    const material = document.getElementById("material").value;
    const thk = document.getElementById("thk").value;
    const length = document.getElementById("length").value;
    const width = document.getElementById("width").value;
    const weight = document.getElementById("weight").value;

    if (!qty || !description) {
        alert("Qty and Description required");
        return;
    }

    bomData.push({
        qty,
        description,
        material,
        thk,
        length,
        width,
        weight
    });

    renderTable();
    clearInputs();
}

/* RENDER TABLE */
function renderTable() {

    let html = `
    <tr>
        <th>SR</th>
        <th>QTY</th>
        <th>DESCRIPTION</th>
        <th>MATERIAL</th>
        <th>THK</th>
        <th>LENGTH</th>
        <th>WIDTH</th>
        <th>UNIT WT</th>
    </tr>`;

    let total = 0;

    bomData.forEach((row, i) => {

        total += Number(row.weight) || 0;

        html += `
        <tr>
            <td>${i + 1}</td>
            <td>${row.qty}</td>
            <td>${row.description}</td>
            <td>${row.material}</td>
            <td>${row.thk}</td>
            <td>${row.length}</td>
            <td>${row.width}</td>
            <td>${row.weight}</td>
        </tr>`;
    });

    document.getElementById("bomTable").innerHTML = html;
    document.getElementById("totalWeight").innerText = total.toFixed(2);
}

/* CLEAR INPUTS */
function clearInputs() {
    document.getElementById("qty").value = "";
    document.getElementById("description").value = "";
    document.getElementById("material").value = "";
    document.getElementById("thk").value = "";
    document.getElementById("length").value = "";
    document.getElementById("width").value = "";
    document.getElementById("weight").value = "";
}

/* EXPORT CSV */
function exportCSV() {

    if (bomData.length === 0) {
        alert("No data");
        return;
    }

    let csv = "Qty,Description,Material,THK,Length,Width,Weight\n";

    bomData.forEach(r => {
        csv += `${r.qty},${r.description},${r.material},${r.thk},${r.length},${r.width},${r.weight}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "bom.csv";
    a.click();
}

/* CLEAR ALL */
function clearAll() {
    bomData = [];
    renderTable();
}

/* LOAD JSON */
fetch("./material-db.json")
.then(res => res.json())
.then(data => {

    MATERIAL_DB = data;

    const materialList = document.getElementById("materialList");
    materialList.innerHTML = "";

    // Pipe materials
    MATERIAL_DB.pipe_material_recommended.items.forEach(i => {
        const opt = document.createElement("option");
        opt.value = i.grade;
        materialList.appendChild(opt);
    });

    console.log("Material DB loaded");
})
.catch(err => console.error(err));

</script>

</body>
</html>
