<label>Outer Diameter (m)</label>
<input type="number" id="OD">

<label>Inner Diameter (m)</label>
<input type="number" id="ID">

<label>Thickness (mm)</label>
<input type="number" id="thk">

<label>No. of Bolt Holes</label>
<input type="number" id="holes">

<label>Bolt Hole Diameter (m)</label>
<input type="number" id="hdia">

<label>Material Density</label>
<select id="density">
    <option value="7850">Steel</option>
    <option value="8000">Stainless Steel</option>
    <option value="2700">Aluminium</option>
</select>

<button onclick="calculate()">Calculate</button>

<script>

function calculate(){

    let OD = parseFloat(document.getElementById("OD").value);
    let ID = parseFloat(document.getElementById("ID").value);
    let thk = parseFloat(document.getElementById("thk").value) / 1000;
    let holes = parseFloat(document.getElementById("holes").value) || 0;
    let hdia = parseFloat(document.getElementById("hdia").value) || 0;
    let density = parseFloat(document.getElementById("density").value);

    if(isNaN(OD) || isNaN(ID) || isNaN(thk) || isNaN(density)){
        document.getElementById("result").innerHTML = "Please enter all required values correctly.";
        return;
    }

    if(OD <= ID){
        document.getElementById("result").innerHTML = "Outer diameter must be greater than inner diameter.";
        return;
    }

    // Area
    let area = (Math.PI/4) * (OD*OD - ID*ID);

    // Bolt holes area
    let holeArea = holes * (Math.PI/4) * (hdia*hdia);

    let netArea = area - holeArea;

    if(netArea <= 0){
        document.getElementById("result").innerHTML = "Invalid geometry: hole area too large.";
        return;
    }

    let volume = netArea * thk;
    let weight = volume * density;

    document.getElementById("result").innerHTML =
        "Net Area = " + netArea.toFixed(4) + " m²<br>" +
        "Weight = " + weight.toFixed(2) + " kg";

}

</script>
